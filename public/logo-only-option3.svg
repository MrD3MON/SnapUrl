<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 135 135" width="100%" height="100%">
  <defs>
    <linearGradient id="snapGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00CC88" />
      <stop offset="100%" stop-color="#0070F3" />
    </linearGradient>
  </defs>
  
  <g transform="translate(20, 20)">
    <!-- Intersecting Endless Loop shaped like a dynamic 'S' -->
    <!-- Left Loop -->
    <path d="M 45 55 C 45 35, 25 15, 5 35 C -15 55, 5 75, 25 55 C 35 45, 55 25, 65 15 C 85 -5, 105 15, 85 35 C 75 45, 60 55, 45 55 Z" 
          fill="none" 
          stroke="url(#snapGrad3)" 
          stroke-width="12" 
          stroke-linecap="round" 
          stroke-linejoin="round" />
          
    <!-- Inner Link Overlay to give 3D overlap effect -->
    <path d="M 25 55 C 35 45, 55 25, 65 15" 
          fill="none" 
          stroke="#00CC88" 
          stroke-width="12" 
          stroke-linecap="round" />
          
    <!-- Fast dash particles representing speed -->
    <line x1="85" y1="65" x2="100" y2="65" stroke="#0070F3" stroke-width="4" stroke-linecap="round" opacity="0.8" />
    <line x1="90" y1="80" x2="110" y2="80" stroke="#00CC88" stroke-width="3" stroke-linecap="round" opacity="0.6" />
    <line x1="80" y1="95" x2="92" y2="95" stroke="#0070F3" stroke-width="2" stroke-linecap="round" opacity="0.4" />
  </g>
</svg>
