<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 150" width="100%" height="100%">
  <defs>
    <linearGradient id="snapGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00CFFD" />
      <stop offset="100%" stop-color="#0070F3" />
    </linearGradient>
  </defs>
  
  <!-- Logo Icon -->
  <g transform="translate(20, 20)">
    <!-- Outer Aperture Ring -->
    <circle cx="55" cy="55" r="48" stroke="url(#snapGrad2)" stroke-width="4" fill="none" opacity="0.3" />
    
    <!-- Shutter Blades / Aperture styling representing camera 'Snap' and connection -->
    <path d="M 55 7 A 48 48 0 0 1 97 31 L 70 47 Z" fill="url(#snapGrad2)" opacity="0.9" />
    <path d="M 97 31 A 48 48 0 0 1 103 76 L 73 59 Z" fill="url(#snapGrad2)" opacity="0.8" />
    <path d="M 103 76 A 48 48 0 0 1 69 101 L 61 71 Z" fill="url(#snapGrad2)" opacity="0.7" />
    <path d="M 69 101 A 48 48 0 0 1 20 87 L 44 67 Z" fill="url(#snapGrad2)" opacity="0.6" />
    <path d="M 20 87 A 48 48 0 0 1 7 42 L 39 52 Z" fill="url(#snapGrad2)" opacity="0.5" />
    <path d="M 7 42 A 48 48 0 0 1 43 9 L 49 39 Z" fill="url(#snapGrad2)" opacity="0.4" />
    
    <!-- Interlocking Center Node (Chain link reference) -->
    <circle cx="55" cy="55" r="16" fill="#111" stroke="url(#snapGrad2)" stroke-width="4" />
    <circle cx="55" cy="55" r="6" fill="url(#snapGrad2)" />
  </g>

  <!-- Typography -->
  <text x="155" y="90" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="64" fill="#FFFFFF">
    Snap<tspan fill="url(#snapGrad2)">Url</tspan>
  </text>
  
  <!-- Subtitle -->
  <text x="158" y="116" font-family="system-ui, -apple-system, sans-serif" font-weight="500" font-size="16" fill="#888888" letter-spacing="3">
    INSTANT LINK ROUTER
  </text>
</svg>
