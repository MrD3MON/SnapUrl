<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="100%" height="100%">
  <defs>
    <linearGradient id="gradOpt10_logo" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8A2387" />
      <stop offset="50%" stop-color="#E94057" />
      <stop offset="100%" stop-color="#F27121" />
    </linearGradient>
    <filter id="shadowOpt10_logo" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>
  
  <g transform="translate(10, 10)">
    <!-- Sleek continuous circular link ring with open ends -->
    <path d="M 50 10 A 40 40 0 1 1 20 23" 
          fill="none" 
          stroke="url(#gradOpt10_logo)" 
          stroke-width="10" 
          stroke-linecap="round" />
          
    <path d="M 50 10 A 40 40 0 0 1 80 23" 
          fill="none" 
          stroke="url(#gradOpt10_logo)" 
          stroke-width="10" 
          stroke-linecap="round"
          opacity="0.5" />

    <!-- Bolt snapping through the center with a shadow -->
    <path d="M 58 20 L 32 54 L 48 54 L 40 82 L 72 44 L 54 44 Z" 
          fill="url(#gradOpt10_logo)" 
          filter="url(#shadowOpt10_logo)" />
          
    <circle cx="50" cy="50" r="4" fill="#FFFFFF" />
  </g>
</svg>
